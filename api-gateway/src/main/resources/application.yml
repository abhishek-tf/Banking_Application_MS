server:
  port: 8083

spring:
  application:
    name: API-GATEWAY

  cloud:
    config:
      enabled: false

    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: true
              lower-case-service-id: true

          routes:
            # --- OpenAPI docs route: rewrite /customers/v3/api-docs -> /v3/api-docs.
            #     Must precede the generic /customers/** route so it matches first. ---
            - id: customer-docs
              uri: lb://CUSTOMER-SERVICE
              predicates:
                - Path=/customers/v3/api-docs
              filters:
                - RewritePath=/customers/v3/api-docs, /v3/api-docs

            # --- Banking service routes. Services serve at their bare base paths,
            #     so requests are forwarded as-is (no prefix, no StripPrefix). ---
            - id: customer-service
              uri: lb://CUSTOMER-SERVICE
              predicates:
                - Path=/customers/**

            - id: account-service
              uri: lb://ACCOUNT-SERVICE
              predicates:
                - Path=/accounts/**

            - id: transaction-service
              uri: lb://TRANSACTION-SERVICE
              predicates:
                - Path=/transactions/**,/transfers/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: transactionServiceCB
                    fallbackUri: forward:/fallback/transactions

            - id: audit-service
              uri: lb://AUDIT-SERVICE
              predicates:
                - Path=/audit/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health,info,metrics,beans,gateway

  endpoint:
    health:
      show-details: always

    gateway:
      access: unrestricted

  tracing:
    sampling:
      probability: 1.0
    propagation:
      type: b3
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans

info:
  app:
    name: API Gateway
    version: 1.0.0
    description: Manages API Gateway

