server:
  port: 8085

spring:
  application:
    name: audit-service

  data:
    mongodb:
      uri: mongodb://localhost:27017/auditdb

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: "*"