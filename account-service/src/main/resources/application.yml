server:
  port: 8082

spring:
  application:
    name: account-service

  data:
    mongodb:
      uri: mongodb://localhost:27017/accountdb

  # jackson:
  #   serialization:
  #     WRITE_DATES_AS_TIMESTAMPS: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

# Swagger / OpenAPI (springdoc). These match the defaults but are pinned explicitly
# so Swagger UI and the API docs are reachable at known paths right after startup:
#   UI:       http://localhost:8082/swagger-ui/index.html
#   API docs: http://localhost:8082/v3/api-docs
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

logging:
  level:
    root: INFO
    com.tnf.account_service: DEBUG
    org.springframework.cloud.openfeign: DEBUG