server:
  port: 8082

spring:
  application:
    name: account-service

  data:
    mongodb:
      uri: mongodb://localhost:27017/accountdb

  # jackson:
  #   serialization:
  #     WRITE_DATES_AS_TIMESTAMPS: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

logging:
  level:
    root: INFO
    com.tnf.account_service: DEBUG
    org.springframework.cloud.openfeign: DEBUG